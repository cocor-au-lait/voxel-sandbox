<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Sandbox</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: monospace;
            color: #eee;
        }
        #loading {
            position: fixed;
            inset: 0;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 16px;
            z-index: 10;
        }
        #loading h1 { font-size: 2rem; letter-spacing: 4px; }
        #loading p { color: #888; }
        canvas { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>
    <div id="loading">
        <h1>VOXEL SANDBOX</h1>
        <p>読み込み中...</p>
    </div>
    <script type="module">
        import init from './voxel_sandbox.js';
        await init();
        document.getElementById('loading').style.display = 'none';
    </script>
</body>
</html>
